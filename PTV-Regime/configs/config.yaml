defaults:
  - _self_
  - domain: lic_boids
  - task: existence
  - model: lic_wm
  - trainer: default
  - evaluator: predictive
  - planner: none
  - ablation: full

seed: 7
deterministic: true
checkpoint_path: null
auto_train_if_missing_checkpoint: true
output_dir: outputs/runs/${domain.name}_${task.name}_${seed}

# Fallback values retained for schema completeness; config groups above override them.
domain:
  name: lic_boids
  mode: homogeneous
  n_samples: 4096
  num_agents: 24
  obs_dim: 4
  action_dim: 2
  event_dim: 5

task:
  name: existence

model:
  name: lic_wm
  h_fast: 96
  c_dim: 16
  num_prototypes: 8
  omega_max: 0.15
  use_event_token: true
  transition_mode: full
  stochastic_climate: false
  enable_residual_channel: false
  residual_eps: 0.05
  fast_mode: gru
  context_dim: 16
  experts: 4

trainer:
  epochs: 100
  batch_size: 64
  lr: 0.0003
  weight_decay: 1.0e-5
  lr_gamma: 0.98
  history_len: 16
  pred_len: 12
  teacher_forcing: true
  lambda_roll: 1.0
  lambda_slow: 0.05
  lambda_jump: 0.01
  event_weight: 0.5

evaluator:
  name: predictive
  threshold: 0.5
  climate_dim: 0
  delta_min: -1.0
  delta_max: 1.0
  delta_steps: 9
  metric_name: min_separation

planner:
  name: none
  horizon: 8
  iterations: 2
  lr: 0.1
  population: 32
  elite: 6

ablation:
  name: full

hydra:
  job:
    chdir: false
